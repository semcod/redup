        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --border: #475569;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --warning: #eab308;
            --error: #ef4444;
        }
        
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f8fafc;
                --surface: #ffffff;
                --surface-hover: #f1f5f9;
                --border: #e2e8f0;
                --text: #1e293b;
                --text-muted: #64748b;
            }
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        
        .header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .header p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        
        .search {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .search input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            color: var(--text);
            font-size: 0.875rem;
            outline: none;
        }
        
        .search input:focus {
            border-color: var(--accent);
        }
        
        .search input::placeholder {
            color: var(--text-muted);
        }
        
        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        
        .file-group {
            margin-bottom: 1rem;
        }
        
        .file-group-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            padding: 0.5rem 0.75rem;
            font-weight: 600;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 0.875rem;
        }
        
        .file-item:hover {
            background: var(--surface-hover);
        }
        
        .file-item.active {
            background: var(--accent);
            color: white;
        }
        
        .file-item.active .file-meta {
            color: rgba(255,255,255,0.7);
        }
        
        .file-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }
        
        .file-info {
            flex: 1;
            min-width: 0;
        }
        
        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .file-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .file-size {
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        
        .empty-state {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
        }
        
        /* Main content */
        .content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .content-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        
        .content-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .content-title h2 {
            font-size: 1rem;
            font-weight: 600;
        }
        
        .content-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            color: var(--text);
            font-size: 0.875rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.15s;
        }
        
        .btn:hover {
            background: var(--border);
        }
        
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        
        .content-body {
            flex: 1;
            overflow: auto;
            padding: 1.5rem;
        }
        
        .welcome {
            max-width: 600px;
            margin: 2rem auto;
            text-align: center;
        }
        
        .welcome h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .welcome p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        pre {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            overflow-x: auto;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.875rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        /* Markdown rendered content styles */
        .markdown-content {
            line-height: 1.6;
            max-width: 100%;
        }
        
        .markdown-content h1, .markdown-content h2, .markdown-content h3,
        .markdown-content h4, .markdown-content h5, .markdown-content h6 {
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
            line-height: 1.3;
        }
        
        .markdown-content h1 { font-size: 1.75rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }
        .markdown-content h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
        .markdown-content h3 { font-size: 1.25rem; }
        .markdown-content h4 { font-size: 1.1rem; }
        
        .markdown-content p {
            margin-bottom: 1rem;
        }
        
        .markdown-content ul, .markdown-content ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }
        
        .markdown-content li {
            margin-bottom: 0.25rem;
        }
        
        .markdown-content code {
            background: var(--surface);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.875em;
        }
        
        .markdown-content pre code {
            background: none;
            padding: 0;
        }
        
        .markdown-content blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
            margin-left: 0;
            margin-bottom: 1rem;
            color: var(--text-muted);
        }
        
        .markdown-content table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1rem;
        }
        
        .markdown-content th, .markdown-content td {
            border: 1px solid var(--border);
            padding: 0.5rem 0.75rem;
            text-align: left;
        }
        
        .markdown-content th {
            background: var(--surface);
            font-weight: 600;
        }
        
        .markdown-content tr:nth-child(even) {
            background: var(--surface-hover);
        }
        
        .markdown-content a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .markdown-content a:hover {
            text-decoration: underline;
        }
        
        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
        }
        
        .markdown-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.5rem 0;
        }
        
        /* Mermaid diagram styles */
        .mermaid-content {
            display: flex;
            justify-content: center;
            padding: 1rem;
            background: var(--surface);
            border-radius: 0.5rem;
            border: 1px solid var(--border);
        }
        
        .mermaid-content .mermaid {
            background: transparent;
        }
        
        /* Image preview styles */
        .image-preview {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 1rem;
            background: var(--surface);
            border-radius: 0.5rem;
            border: 1px solid var(--border);
        }
        
        .image-preview img {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            
            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 40vh;
            }
            
            .file-list {
                display: flex;
                flex-wrap: nowrap;
                overflow-x: auto;
                gap: 0.25rem;
                padding: 0.5rem;
            }
            
            .file-group {
                display: flex;
                flex-direction: row;
                margin: 0;
            }
            
            .file-group-title {
                display: none;
            }
            
            .file-item {
                flex-direction: column;
                min-width: 80px;
                padding: 0.5rem;
                text-align: center;
            }
            
            .file-info {
                display: none;
            }
            
            .file-size {
                display: none;
            }
        }
    </style>

hitecture summary | Paste into ChatGPT/Claude for code analysis |\n| `analysis.yaml` | **YAML** | **📊 Structured data** - Machine-readable | For scripts and automated processing |\n| `analysis.json` | **JSON** | **🔧 API format** - Programmatic access | For integration with other tools |\n\n### 📊 Visualizations\n\n| File | Format | Purpose | Description |\n|------|--------|---------|-------------|\n| `flow.mmd` | **Mermaid** | **🔄 Control flow diagram** | Function call paths with complexity styling |\n| `calls.mmd` | **Mermaid** | **📞 Call graph** | Function dependencies (edges only) |\n| `compact_flow.mmd` | **Mermaid** | **📦 Module overview** | Aggregated module-level view |\n\n## 🚀 Quick Start Commands\n\n### Basic Analysis\n```bash\n# Quick health check (TOON format only)\ncode2llm ./ -f toon\n\n# Generate all formats (what created these files)\ncode2llm ./ -f all\n\n# LLM-ready context only\ncode2llm ./ -f context\n```\n\n### Performance Options\n```bash\n# Fast analysis for large projects\ncode2llm ./ -f toon --strategy quick\n\n# Memory-limited analysis\ncode2llm ./ -f all --max-memory 500\n\n# Skip PNG generation (faster)\ncode2llm ./ -f all --no-png\n```\n\n### Refactoring Focus\n```bash\n# Get refactoring recommendations\ncode2llm ./ -f evolution\n\n# Focus on specific code smells\ncode2llm ./ -f toon --refactor --smell god_function\n\n# Data flow analysis\ncode2llm ./ -f flow --data-flow\n```\n\n## 📖 Understanding Each File\n\n### `analysis.toon` - Health Diagnostics\n**Purpose**: Quick overview of code health issues\n**Key sections**:\n- **HEALTH**: Critical issues (🔴) and warnings (🟡)\n- **REFACTOR**: Prioritized refactoring actions\n- **COUPLING**: Module dependencies and potential cycles\n- **LAYERS**: Package complexity metrics\n- **FUNCTIONS**: High-complexity functions (CC ≥ 10)\n- **CLASSES**: Complex classes needing attention\n\n**Example usage**:\n```bash\n# View health issues\ncat analysis.toon | head -30\n\n# Check refactoring priorities\ngrep                 if (!groups[type]) groups[type] = [];
                groups[type].push(file);
            }
            
            let html = '';
            for (const [typeName, groupFiles] of Object.entries(groups)) {
                html += `
                    <div class="file-group">
                        <div class="file-group-title">${typeName} Files (${groupFiles.length})</div>
                        ${groupFiles.map(f => `
                            <div class="file-item ${currentFile?.name === f.name ? 'active' : ''}" 
                                 onclick="selectFile('${f.name}')">
                                <span class="file-icon">${f.icon}</span>
                                <div class="file-info">
                                    <div class="file-name">${f.name}</div>
                                    <div class="file-meta">${f.path}</div>
                                </div>
                                <span class="file-size">${f.size}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            list.innerHTML = html;
        }

        function selectFile(name) {
            const file = files.find(f => f.name === name);
            if (!file) return;
            
            currentFile = file;
            
            document.getElementById('contentIcon').textContent = file.icon;
            document.getElementById('contentTitle').textContent = file.name;
            
            // Actions
            const actions = document.getElementById('contentActions');
            actions.innerHTML = `
                <a href="${file.rel_path}" download class="btn">⬇ Download</a>
                <a href="${file.rel_path}" target="_blank" class="btn btn-primary">↗ Open Raw</a>
            `;
            
            // Content
            const body = document.getElementById('contentBody');
            if (file.type === 'markdown') {
                // Render markdown as HTML using marked.js
                body.innerHTML = `<div class="markdown-content">${marked.parse(file.content)}</div>`;
            } else if (file.type === 'html') {
                // For HTML files, show in iframe for safety
                body.innerHTML = `<iframe src="${file.rel_path}" style="width:100%;height:100%;border:none;border-radius:0.5rem;"></iframe>`;
            } else if (file.type === 'image') {
                // For images, display the actual image
                body.innerHTML = `<div class="image-preview"><img src="${file.rel_path}" alt="${file.name}" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:0.5rem;"></div>`;
            } else if (file.type === 'mermaid') {
                // Render mermaid diagram
                const diagramId = 'mermaid-diagram-' + Date.now();
                body.innerHTML = `<div class="mermaid-content"><pre class="mermaid" id="${diagramId}">${file.content}</pre></div>`;
                // Initialize mermaid on the new element
                setTimeout(() => {
                    mermaid.init(undefined, document.getElementById(diagramId));
                }, 0);
            } else if (file.type === 'json') {
                try {
                    const json = JSON.parse(file.content.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&'));
                    const formatted = JSON.stringify(json, null, 2);
                    body.innerHTML = `<pre><code class="language-json">${formatted.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                    hljs.highlightElement(body.querySelector('code'));
                } catch {
                    body.innerHTML = `<pre>${file.content}</pre>`;
                }
            } else if (file.type === 'yaml') {
                // YAML with syntax highlighting
                body.innerHTML = `<pre><code class="language-yaml">${file.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                hljs.highlightElement(body.querySelector('code'));
            } else if (file.type === 'toon') {
                // TOON with simple highlighting (use ini as closest match for key: value format)
                body.innerHTML = `<pre><code class="language-ini">${file.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                hljs.highlightElement(body.querySelector('code'));
            } else if (file.type === 'code') {
                // Code files with auto-highlighting
                body.innerHTML = `<pre><code>${file.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                hljs.highlightElement(body.querySelector('code'));
            } else {
                body.innerHTML = `<pre>${file.content}</pre>`;
            }
            
            renderFileList(document.getElementById('search').value);
        }

        function filterFiles(query) {
            renderFileList(query);
        }

        function renderStats() {
            const stats = {};
            for (const f of files) {
                stats[f.type_name] = (stats[f.type_name] || 0) + 1;
            }
            
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = Object.entries(stats)
                .sort((a, b) => b[1] - a[1])
                .map(([type, count]) => `
                    <div class="stat-card">
                        <div class="stat-value">${count}</div>
                        <div class="stat-label">${type}</div>
                    </div>
                `).join('');
        }

        // Initialize
        renderStats();
        renderFileList();
        
        // Select first file if available
        if (files.length > 0) {
            selectFile(files[0].name);
        }
    </script>
</body>
</html>
