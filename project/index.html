<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>code2llm Analysis Results</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --border: #475569;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --warning: #eab308;
            --error: #ef4444;
        }
        
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #f8fafc;
                --surface: #ffffff;
                --surface-hover: #f1f5f9;
                --border: #e2e8f0;
                --text: #1e293b;
                --text-muted: #64748b;
            }
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        
        .header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .header p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        
        .search {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .search input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            color: var(--text);
            font-size: 0.875rem;
            outline: none;
        }
        
        .search input:focus {
            border-color: var(--accent);
        }
        
        .search input::placeholder {
            color: var(--text-muted);
        }
        
        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        
        .file-group {
            margin-bottom: 1rem;
        }
        
        .file-group-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            padding: 0.5rem 0.75rem;
            font-weight: 600;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 0.875rem;
        }
        
        .file-item:hover {
            background: var(--surface-hover);
        }
        
        .file-item.active {
            background: var(--accent);
            color: white;
        }
        
        .file-item.active .file-meta {
            color: rgba(255,255,255,0.7);
        }
        
        .file-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }
        
        .file-info {
            flex: 1;
            min-width: 0;
        }
        
        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .file-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .file-size {
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        
        .empty-state {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
        }
        
        /* Main content */
        .content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .content-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        
        .content-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .content-title h2 {
            font-size: 1rem;
            font-weight: 600;
        }
        
        .content-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            color: var(--text);
            font-size: 0.875rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.15s;
        }
        
        .btn:hover {
            background: var(--border);
        }
        
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        
        .content-body {
            flex: 1;
            overflow: auto;
            padding: 1.5rem;
        }
        
        .welcome {
            max-width: 600px;
            margin: 2rem auto;
            text-align: center;
        }
        
        .welcome h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .welcome p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        
        pre {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            overflow-x: auto;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 0.875rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            
            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 40vh;
            }
            
            .file-list {
                display: flex;
                flex-wrap: nowrap;
                overflow-x: auto;
                gap: 0.25rem;
                padding: 0.5rem;
            }
            
            .file-group {
                display: flex;
                flex-direction: row;
                margin: 0;
            }
            
            .file-group-title {
                display: none;
            }
            
            .file-item {
                flex-direction: column;
                min-width: 80px;
                padding: 0.5rem;
                text-align: center;
            }
            
            .file-info {
                display: none;
            }
            
            .file-size {
                display: none;
            }
        }
    </style>
</head>

from code2logic | Generated via code2logic integration |\n\n### 🤖 LLM-Ready Documentation\n\n| File | Format | Purpose | Use Case |\n|------|--------|---------|----------|\n| `prompt.txt` | **Text** | **📝 Ready-to-send prompt** - Lists all files with instructions | Attach to LLM conversation as context guide |\n| `context.md` | **Markdown** | **📖 LLM narrative** - Architecture summary | Paste into ChatGPT/Claude for code analysis |\n| `analysis.yaml` | **YAML** | **📊 Structured data** - Machine-readable | For scripts and automated processing |\n| `analysis.json` | **JSON** | **🔧 API format** - Programmatic access | For integration with other tools |\n\n### 📊 Visualizations\n\n| File | Format | Purpose | Description |\n|------|--------|---------|-------------|\n| `flow.mmd` | **Mermaid** | **🔄 Control flow diagram** | Function call paths with complexity styling |\n| `calls.mmd` | **Mermaid** | **📞 Call graph** | Function dependencies (edges only) |\n| `compact_flow.mmd` | **Mermaid** | **📦 Module overview** | Aggregated module-level view |\n\n## 🚀 Quick Start Commands\n\n### Basic Analysis\n```bash\n# Quick health check (TOON format only)\ncode2llm ./ -f toon\n\n# Generate all formats (what created these files)\ncode2llm ./ -f all\n\n# LLM-ready context only\ncode2llm ./ -f context\n```\n\n### Performance Options\n```bash\n# Fast analysis for large projects\ncode2llm ./ -f toon --strategy quick\n\n# Memory-limited analysis\ncode2llm ./ -f all --max-memory 500\n\n# Skip PNG generation (faster)\ncode2llm ./ -f all --no-png\n```\n\n### Refactoring Focus\n```bash\n# Get refactoring recommendations\ncode2llm ./ -f evolution\n\n# Focus on specific code smells\ncode2llm ./ -f toon --refactor --smell god_function\n\n# Data flow analysis\ncode2llm ./ -f flow --data-flow\n```\n\n## 📖 Understanding Each File\n\n### `analysis.toon` - Health Diagnostics\n**Purpose**: Quick overview of code health issues\n**Key sections**:\n- **HEALTH**: Critical issues (🔴) and warnings (🟡)\n- **REFACTOR**: Prioritized refactoring actions\n- **COUPLING**: Module dependencies and potential cycles\n- **LAYERS**: Package complexity metrics\n- **FUNCTIONS**: High-complexity functions (CC ≥ 10)\n- **CLASSES**: Complex classes needing attention\n\n**Example usage**:\n```bash\n# View health issues\ncat analysis.toon | head -30\n\n# Check refactoring priorities\ngrep &quot;REFACTOR&quot; analysis.toon\n```\n\n### `evolution.toon` - Refactoring Queue\n**Purpose**: Step-by-step refactoring plan\n**Key sections**:\n- **NEXT**: Immediate actions to take\n- **RISKS**: Potential breaking changes\n- **METRICS-TARGET**: Success criteria\n\n**Example usage**:\n```bash\n# Get refactoring plan\ncat evolution.toon\n\n# Track progress\ngrep &quot;NEXT&quot; evolution.toon\n```\n\n### `flow.toon` - Data Flow Analysis\n**Purpose**: Understand data movement through the system\n**Key sections**:\n- **PIPELINES**: Data processing chains\n- **CONTRACTS**: Function input/output contracts\n- **SIDE_EFFECTS**: Functions with external impacts\n\n**Example usage**:\n```bash\n# Find data pipelines\ngrep &quot;PIPELINES&quot; flow.toon\n\n# Identify side effects\ngrep &quot;SIDE_EFFECTS&quot; flow.toon\n```\n\n### `map.toon` - Structural Map\n**Purpose**: High-level architecture overview\n**Key sections**:\n- **MODULES**: All modules with basic stats\n- **IMPORTS**: Dependency relationships\n- **SIGNATURES**: Public API functions\n\n**Example usage**:\n```bash\n# See project structure\ncat map.toon | head -50\n\n# Find public APIs\ngrep &quot;SIGNATURES&quot; map.toon\n```\n\n### `project.toon` - Project Logic (Code2Logic)\n**Purpose**: Compact module view generated by code2logic integration\n**Key sections**:\n- **Modules list**: All project modules with file sizes\n- **Imports**: Dependency information\n- **Classes/Functions**: Summary counts\n\n**When to use**: When you need a lightweight project overview combined with code2llm analysis\n\n**Example usage**:\n```bash\n# View compact proje         let currentFile = null;

        function renderFileList(filter = '') {
            const list = document.getElementById('fileList');
            const filtered = files.filter(f => 
                f.name.toLowerCase().includes(filter.toLowerCase()) ||
                f.path.toLowerCase().includes(filter.toLowerCase())
            );
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">No files found</div>';
                return;
            }
            
            // Group by type
            const groups = {};
            for (const file of filtered) {
                const type = file.type_name;
                if (!groups[type]) groups[type] = [];
                groups[type].push(file);
            }
            
            let html = '';
            for (const [typeName, groupFiles] of Object.entries(groups)) {
                html += `
                    <div class="file-group">
                        <div class="file-group-title">${typeName} Files (${groupFiles.length})</div>
                        ${groupFiles.map(f => `
                            <div class="file-item ${currentFile?.name === f.name ? 'active' : ''}" 
                                 onclick="selectFile('${f.name}')">
                                <span class="file-icon">${f.icon}</span>
                                <div class="file-info">
                                    <div class="file-name">${f.name}</div>
                                    <div class="file-meta">${f.path}</div>
                                </div>
                                <span class="file-size">${f.size}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            list.innerHTML = html;
        }

        function selectFile(name) {
            const file = files.find(f => f.name === name);
            if (!file) return;
            
            currentFile = file;
            
            document.getElementById('contentIcon').textContent = file.icon;
            document.getElementById('contentTitle').textContent = file.name;
            
            // Actions
            const actions = document.getElementById('contentActions');
            actions.innerHTML = `
                <a href="${file.rel_path}" download class="btn">⬇ Download</a>
                <a href="${file.rel_path}" target="_blank" class="btn btn-primary">↗ Open Raw</a>
            `;
            
            // Content
            const body = document.getElementById('contentBody');
            if (file.type === 'markdown' || file.type === 'html') {
                // For markdown, show formatted but also offer raw view
                body.innerHTML = `<pre>${file.content}</pre>`;
            } else if (file.type === 'json') {
                try {
                    const json = JSON.parse(file.content.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&'));
                    body.innerHTML = `<pre>${JSON.stringify(json, null, 2)}</pre>`;
                } catch {
                    body.innerHTML = `<pre>${file.content}</pre>`;
                }
            } else {
                body.innerHTML = `<pre>${file.content}</pre>`;
            }
            
            renderFileList(document.getElementById('search').value);
        }

        function filterFiles(query) {
            renderFileList(query);
        }

        function renderStats() {
            const stats = {};
            for (const f of files) {
                stats[f.type_name] = (stats[f.type_name] || 0) + 1;
            }
            
            const grid = document.getElementById('statsGrid');
            grid.innerHTML = Object.entries(stats)
                .sort((a, b) => b[1] - a[1])
                .map(([type, count]) => `
                    <div class="stat-card">
                        <div class="stat-value">${count}</div>
                        <div class="stat-label">${type}</div>
                    </div>
                `).join('');
        }

        // Initialize
        renderStats();
        renderFileList();
        
        // Select first file if available
        if (files.length > 0) {
            selectFile(files[0].name);
        }
